<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Profile Desktop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css"
        integrity="sha512-ApSLB1Pd3/bZN8fWB/RG9YhN/7bd9Hkf3AGaE2mPfebjrxagjuBtx2GcgdqIlJkUzwylBo61r9Xa9NmgBI0swA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <nav class="side-navbar">
        <div class="ig-logo"><i class="fa-brands fa-instagram"></i> Instagram</div>
        <div class="nav-links">
            <div class="nav-item"><i class="fa-solid fa-house"> </i>Home</div>
            <div class="nav-item"> <img src="https://img.icons8.com/?size=100&id=PxI9IPCyBAOD&format=png&color=000000"
                    alt="" style="height: 24px; width: 24px;"> Reels</div>
            <div class="nav-item"> <img
                    src="https://cdn-icons-png.magnific.com/256/4468/4468459.png?semt=ais_white_label" alt=""
                    style="height: 24px; width: 24px;"> Messages</div>
            <div class="nav-item"> <img
                    src="https://www.shutterstock.com/image-vector/search-icon-vector-template-ui-260nw-1249273225.jpg"
                    alt="" style="height: 44px; width: 44px;"> Search</div>
            <div class="nav-item"> <img
                    src="https://icons.veryicon.com/png/o/miscellaneous/ui-basic-linear-icon/like-106.png" alt=""
                    style="height: 24px; width: 24px;"> Notifications</div>
            <div class="nav-item"> <img
                    src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQoYmZgPB2_lbY9jjwhnbornmi2SaK3JyNPxvsaa_mKrQ&s"
                    alt="" style="height: 24px; width: 24px;"> Create</div>

        </div>
        <div class="nav-footer">
            <div class="nav-item" style="font-size: 24px;"><i class="fa-solid fa-bars"></i></div>
        </div>
    </nav>


    <main class="main-content">
        <div class="profile-container">


            <header class="profile-header">
                <div class="avatar">

                    <div class="profile">

                    </div>
                </div>

                <div>
                    <div>
                        <h2>shivakoushik05</h2>

                    </div>

                    <div class="name-row">Shiva Koushik Kolluri</div>

                    <ul class="stats-row">
                        <li><strong>4</strong> posts</li>
                        <li><strong>212</strong> followers</li>
                        <li><strong>335</strong> following</li>
                    </ul>

                    <div class="bio-text">
                        🇮🇳<br>
                        Melophile<br>
                        Athāto brahma jijñāsā<br>
                        Yato Dharmo Sanatana
                    </div>
                </div>
            </header>


            <div class="action-buttons-container">
                <button class="action-btn">Edit profile</button>
                <button class="action-btn">View archive</button>
            </div>


            <section class="highlights-section">
                <div class="highlight">
                    <div class="circle" style="  background-image: url(./vbyld.jpg);
                  background-size: cover;"></div>
                    <span>#VBYLD</span>
                </div>
                <div class="highlight">
                    <div class="circle" style="  background-image: url(./family.jpg);
                  background-size: cover;"></div>
                    <span>Family 💗</span>
                </div>
                <div class="highlight">
                    <div class="circle" style="  background-image: url(./theerthayatra.jpg);
                  background-size: cover;"></div>
                    <span>#Theerthayatra</span>
                </div>
                <div class="highlight">
                    <div class="circle" style="  background-image: url(./memories.jpg);
                  background-size: cover;"></div>
                    <span>✨</span>
                </div>
            </section>


            <div class="tabs-divider">
                <div class="tab-item ">🔳</div>
                <div class="tab-item">📺</div>
                <div class="tab-item">🔖</div>
                <div class="tab-item">🔄</div>
                <div class="tab-item">👤</div>
            </div>


            <div class="posts-grid">
                <div class="grid-card" style="background-image: url(./image.png); background-size: cover;">
                </div>
                <div class="grid-card" style="background-image: url(./vby.png); background-size: cover;">
                </div>
                <div class="grid-card" style="background-image: url(./evening.png); background-size: cover;">
                </div>
                <div class="grid-card" style="background-image: url(./sunset.png); background-size: cover;">
                </div>
                
            </div>

        </div>
    </main>

</body>

</html>
