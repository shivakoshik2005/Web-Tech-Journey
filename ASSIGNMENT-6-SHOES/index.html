<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css"
        integrity="sha512-ApSLB1Pd3/bZN8fWB/RG9YhN/7bd9Hkf3AGaE2mPfebjrxagjuBtx2GcgdqIlJkUzwylBo61r9Xa9NmgBI0swA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <nav id="navbar">
        <h2 id="brand-name">sneakers</h2>
        <div id="nav-items">
            <p class="options">Collections</p>
            <p class="options">Men</p>
            <p class="options">Women</p>
            <p class="options">About</p>
            <p class="options">Contact</p>
        </div>

        <div id="right-part">
            <i class="fa-solid fa-cart-arrow-down" style="font-size: 20px;"></i>
            <div id="profile-icon">

            </div>
        </div>
    </nav>


    <main id="main-content">
        <div id="images">
            <div id="large-image">

            </div>
            <div id="small-images">
            <div class="circles" style="  background-image: url(https://kerem-gurbuz-fm-ecommerce-product-page.vercel.app/_next/image?url=%2Fassets%2Fimages%2Fproduct-1-image-1-thumbnail.jpg&w=256&q=75); background-size: cover;"></div>
            <div class="circles" style="  background-image: url(https://kerem-gurbuz-fm-ecommerce-product-page.vercel.app/_next/image?url=%2Fassets%2Fimages%2Fproduct-1-image-2-thumbnail.jpg&w=256&q=75);background-size: cover;"></div>
            <div class="circles" style="  background-image: url(https://kerem-gurbuz-fm-ecommerce-product-page.vercel.app/_next/image?url=%2Fassets%2Fimages%2Fproduct-1-image-3-thumbnail.jpg&w=256&q=75);background-size: cover;"></div>
            <div class="circles" style="  background-image: url(https://kerem-gurbuz-fm-ecommerce-product-page.vercel.app/_next/image?url=%2Fassets%2Fimages%2Fproduct-1-image-4-thumbnail.jpg&w=256&q=75);background-size: cover;"></div>
            </div>
        </div>






        <div id="details">
            <h3 style="font-family: monospace; font-weight: lighter; letter-spacing: 4px; margin-bottom:20px;">SNEAKER
                COMPANY</h3>
            <h1>Fall Limited Edition <br> Sneakers</h1>
            <p>These low-profile sneakers are your perfect casual wear companion. Featuring a durable rubber outer sole,
                they'll
                withstand everything the weather can offer.</p>
            <div class="price-container">
                <span class="current-price">$125.00</span>
                <div
                    style="background-color: black; padding: 4px 9px; border-radius: 7px; font-size: 13px; color:aliceblue">
                    50%</div>
            </div>
            <span class="original-price">$250.00</span>


            <div id="buttons-div">
                <button id="item-count">
                    - &nbsp; &nbsp; &nbsp; &nbsp;<span
                        style="color: black; font-weight: lighter; font-size: 20px;">0</span> &nbsp;
                    &nbsp; &nbsp;&nbsp; +
                </button>
                <button class="cart-btn">
                    <i class="fa-solid fa-cart-arrow-down" style="font-size: 20px;"></i>
                    Add to Cart
                </button>
            </div>
        </div>
    </main>
</body>

</html>
